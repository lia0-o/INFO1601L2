<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
      }
      nav {
        margin-bottom: 30px;
      }
      nav a {
        margin-right: 15px;
        text-decoration: none;
        color: #0066cc;
      }
      nav a:hover {
        text-decoration: underline;
      }
      form {
        display: flex;
        flex-direction: column;
      }
      label {
        margin-top: 15px;
        font-weight: bold;
      }
      input, textarea {
        margin-top: 5px;
        padding: 8px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        margin-top: 20px;
        padding: 10px;
        background-color: #0066cc;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0052a3;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="../index.html">Home</a>
      <a href="./signup.html"><b>Sign Up</b></a>
    </nav>

    <h1>Sign Up Form</h1>

    <form action="../results.html" method="GET">
      <fieldset>
        <legend>Demographic Info</legend>

        <label>
          Full Name
          <input type="text" placeholder="Enter your name" name="fullname" />
        </label>

        <br />

        <label>
          Sex
          <select name="sex">
            <option value="1">male</option>
            <option value="2">female</option>
            <option value="3">other</option>
          </select>
        </label>

        <br>

        <label for="dob">Date Of Birth</label>
        <input type="date" value="2000-01-01" name="dob" />


        <br>

      </fieldset>

      <fieldset>
        <legend>Contact Info</legend>

        <label>
          Email
          <input type="email" name="email" />
        </label>

        <br />

        <label>
          County
          <input list="counties" name="county" />
          <datalist id="counties">
            <option value="Caroni"></option>
            <option value="Mayaro"></option>
            <option value="Nariva"></option>
            <option value="Saint Andrew"></option>
            <option value="Saint David"></option>
            <option value="Saint George"></option>
            <option value="Saint Patrick"></option>
            <option value="Victoria"></option>
          </datalist>
        </label>

        <br />

        <label>
          Telephone
          <input type="tel" name="telephone" />
        </label>
      </fieldset>

     <fieldset>
        <legend>Courses</legend>

        <label>
          <input type="checkbox" name="courses" value="info1601" checked/>
          <span>Info 1601</span>
        </label>
      
        <label>
          <input type="checkbox" name="courses" value="comp1602"/>
          <span>COMP 1602</span>
        </label>

        <label>
          <input type="checkbox" name="courses" value="comp1603"/>
          <span>COMP 1603</span>
        </label>

        <label>
          <input type="checkbox" name="courses" value="comp1604"/>
          <span>COMP 1604</span>
        </label>

      </fieldset>

      <br>
      <input type="submit" value="signup" />
    </form>
  </body>
</html>
